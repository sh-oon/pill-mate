name: pill_mate
description: "필메이트 - Offline medication and supplement tracker with local notifications, calendar and reports"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^14.6.2

  # Local database (Drift / SQLite)
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0

  # Notifications and time
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Persistence (onboarding flag, light settings)
  shared_preferences: ^2.3.4

  # Vector assets (mascot)
  flutter_svg: ^2.0.10+1

  # Native iOS Liquid Glass widgets (real UIKit via PlatformView)
  cupertino_native_better: ^1.4.5

  # Codegen / model utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  # custom_lint dropped: riverpod_lint 3.1.1+ uses analysis_server_plugin instead.
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/onboarding/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.otf
          weight: 900
