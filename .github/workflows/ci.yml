name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.9

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Codegen (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Format check intentionally skipped — codebase precedes this CI and is
      # not yet `dart format` clean. Will be enabled after a one-shot
      # `chore(style): apply dart format` PR. Tracked separately.

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Test
        run: flutter test --reporter=expanded

  android-build-smoke:
    name: Android build smoke
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build debug APK (smoke)
        run: flutter build apk --debug

  ios-build-smoke:
    name: iOS build smoke
    runs-on: macos-15
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      # cupertino_native_better 1.4.5 uses iOS 26 SDK 'Glass' SwiftUI type.
      # Requires Xcode 26+. Pick the latest stable Xcode available on macos-15.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show selected Xcode
        run: xcodebuild -version

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
