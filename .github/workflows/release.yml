name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.41.9
  NODE_VERSION: 20

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      released: ${{ steps.sr.outputs.new_release_published }}
      version: ${{ steps.sr.outputs.new_release_version }}
      tag: ${{ steps.sr.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Semantic Release
        id: sr
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer@13
            @semantic-release/release-notes-generator@14
            @semantic-release/exec@6
            @semantic-release/git@10
            @semantic-release/github@11
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android (AAB + APK)
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore (if secret present)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  ANDROID_KEYSTORE_BASE64 secret not set — release artifacts will be debug-signed (not Play-uploadable)."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore/upload.jks" >> "$GITHUB_ENV"

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --build-name=${{ needs.semantic-release.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Build APK (universal, sideload용)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --build-name=${{ needs.semantic-release.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Upload AAB to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.semantic-release.outputs.tag }}" \
            build/app/outputs/bundle/release/app-release.aab \
            build/app/outputs/flutter-apk/app-release.apk \
            --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ needs.semantic-release.outputs.version }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS (no-codesign smoke until Apple Dev ready)
    runs-on: macos-15
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      # cupertino_native_better 1.4.5 needs iOS 26 SDK (Liquid Glass).
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # Placeholder: replace this step with archive + TestFlight upload
      # once APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_KEY_P8 secrets exist.
      - name: Build iOS (no codesign smoke)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=${{ needs.semantic-release.outputs.version }} \
            --build-number=${{ github.run_number }}
